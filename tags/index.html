<script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.js"></script>
<script>

async function applyTrad() {
    const isTrad = localStorage.getItem('is-trad') === 'true';
    const tcText = document.getElementById('tc-text');
    if (isTrad) {
        const converter = OpenCC.Converter({ from: 'cn', to: 'tw' });
        
        const walk = (node) => {
            if (node.nodeType === 3) {
                node.data = converter(node.data);
            } else if (node.nodeType === 1 && node.tagName !== 'SCRIPT' && node.tagName !== 'STYLE') {
                for (let child of node.childNodes) walk(child);
            }
        };
        walk(document.body);
        if (tcText) tcText.innerText = '已轉換為正體中文';
    }
}

function toggleTrad() {
    const isTrad = localStorage.getItem('is-trad') === 'true';
    if (isTrad) {
        localStorage.setItem('is-trad', 'false');
    } else {
        localStorage.setItem('is-trad', 'true');
    }
    location.reload(); 
}


function applyFont() {
    const isHarmony = localStorage.getItem('font-harmony') === 'true';
    if (isHarmony) {
        document.documentElement.classList.add('font-harmony');
    } else {
        document.documentElement.classList.remove('font-harmony');
    }
}

function toggleFont() {
    const isHarmony = document.documentElement.classList.contains('font-harmony');
    if (isHarmony) {
        document.documentElement.classList.remove('font-harmony');
        localStorage.setItem('font-harmony', 'false');
    } else {
        document.documentElement.classList.add('font-harmony');
        localStorage.setItem('font-harmony', 'true');
    }
}


window.addEventListener('DOMContentLoaded', () => {
    applyFont();
    applyTrad();
});
</script>
